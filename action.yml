name: Board Transition
description: Transition a GitHub Projects v2 board item to a new status
inputs:
  pr-url:
    description: Pull request URL to add and transition on the board
    required: true
  status:
    description: Target status (Todo, Planning, In Progress, In Review, Done)
    required: true
  project-number:
    description: GitHub Projects v2 project number
    required: true
  owner:
    description: Owner of the project (org login)
    required: true
  token:
    description: GitHub token with project scope
    required: true
runs:
  using: composite
  steps:
    - name: Transition to ${{ inputs.status }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_URL: ${{ inputs.pr-url }}
        STATUS: ${{ inputs.status }}
        PROJECT_NUMBER: ${{ inputs.project-number }}
        OWNER: ${{ inputs.owner }}
      run: |
        set -euo pipefail

        ITEM_ID=$(gh project item-add "$PROJECT_NUMBER" --owner "$OWNER" --url "$PR_URL" --format json \
          | jq -r '.id // empty') || true

        PROJECT_ID=$(gh project list --owner "$OWNER" --format json \
          | jq -r --argjson n "$PROJECT_NUMBER" '.projects[] | select(.number == $n) | .id')

        if [ -z "$PROJECT_ID" ]; then
          echo "Project $PROJECT_NUMBER was not found for owner $OWNER" >&2
          exit 1
        fi

        if [ -z "$ITEM_ID" ]; then
          ITEM_ID=$(gh project item-list "$PROJECT_NUMBER" --owner "$OWNER" --format json --limit 1000 \
            | jq -r --arg url "$PR_URL" '
              .items[]
              | select((.content.url // .contentUrl // "") == $url)
              | .id
            ' \
            | head -n 1)
        fi

        if [ -z "$ITEM_ID" ]; then
          echo "Project item for $PR_URL was not found in project $PROJECT_NUMBER" >&2
          exit 1
        fi

        FIELDS=$(gh project field-list "$PROJECT_NUMBER" --owner "$OWNER" --format json)
        FIELD_ID=$(echo "$FIELDS" | jq -r '.fields[] | select(.name == "Status") | .id')
        OPTION_ID=$(echo "$FIELDS" | jq -r --arg s "$STATUS" \
          '.fields[] | select(.name == "Status") | .options[] | select(.name == $s) | .id')

        if [ -z "$FIELD_ID" ]; then
          echo "Status field was not found in project $PROJECT_NUMBER" >&2
          exit 1
        fi

        if [ -z "$OPTION_ID" ]; then
          echo "Status option '$STATUS' was not found in project $PROJECT_NUMBER" >&2
          exit 1
        fi

        gh project item-edit \
          --id "$ITEM_ID" \
          --project-id "$PROJECT_ID" \
          --field-id "$FIELD_ID" \
          --single-select-option-id "$OPTION_ID"

        echo "PR → $STATUS"
